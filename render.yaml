services:
  - type: web
    name: mascotafeliz-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && python manage.py seed_demo_data && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/rutas-moviles/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com,127.0.0.1,localhost
      - key: DATABASE_URL
        value: sqlite:///db.sqlite3
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: FRONTEND_URL
        value: https://your-frontend.vercel.app
      - key: WEBPAY_HOST
        value: https://webpay3gint.transbank.cl
      - key: WEBPAY_API_KEY_ID
        value: "597055555532"
      - key: WEBPAY_API_KEY_SECRET
        sync: false
